<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pharaon</title>
  <meta name="description" content="Pharaon — the memory engine for students. Mobile app." />
  <meta name="theme-color" content="#fafaf9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pharaon" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="assets/fonts/dm-sans.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="mobile.css" />
</head>
<body>

<!-- Boot splash: shown while the Python engine starts -->
<div id="pySplash">
  <div class="splash-card">
    <img src="assets/logo.png" alt="" class="splash-logo" />
    <div class="splash-title">phar&#257;on</div>
    <div class="splash-track"><div class="splash-fill" id="pySplashBar"></div></div>
    <div class="splash-msg" id="pySplashMsg">Starting…</div>
  </div>
</div>

<div class="layout">

  <!-- Sidebar (tablets / wide screens) -->
  <aside class="sidebar">

    <div class="brand" onclick="navigate('today')" style="cursor:pointer">
      <img src="assets/logo.png" alt="Pharaon" class="brand-logo"
           onerror="this.style.display='none';document.getElementById('brandFallback').style.display='flex'" />
      <span id="brandFallback" class="brand-fallback" style="display:none">⚡</span>
      <div class="brand-name">phar&#257;on</div>
    </div>

    <nav class="nav">
      <div class="nav-section-label">COMMAND</div>
      <a class="nav-item" data-page="today" href="#">
        <svg class="nav-ic" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/><path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Today
      </a>
      <a class="nav-item" data-page="recall" href="#">
        <svg class="nav-ic" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 9h6M7 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Active Recall
      </a>
      <a class="nav-item" data-page="calendar" href="#">
        <svg class="nav-ic" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14M7 3v2M13 3v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Calendar
      </a>

      <div class="nav-section-label" style="margin-top:8px">LIBRARY</div>
      <a class="nav-item" data-page="topics" href="#">
        <svg class="nav-ic" viewBox="0 0 20 20" fill="none"><path d="M4 5h12M4 10h8M4 15h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Subjects &amp; Topics
      </a>
      <a class="nav-item" data-page="exams" href="#">
        <svg class="nav-ic" viewBox="0 0 20 20" fill="none"><path d="M5 3h10a1 1 0 0 1 1 1v13l-3-2-3 2-3-2-2 2V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M8 8h5M8 11h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Exams &amp; Tests
      </a>
      <a class="nav-item" data-page="fitness" href="#">
        <svg class="nav-ic" viewBox="0 0 20 20" fill="none"><path d="M3 10h2M15 10h2M5 10a5 5 0 0 1 10 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="10" cy="10" r="2" fill="currentColor"/><path d="M3 8v4M17 8v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Fitness Hub
      </a>
      <a class="nav-item" data-page="otherdates" href="#">
        <svg class="nav-ic" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.5"/><path d="M7 12h.01M10 12h.01M13 12h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Availability
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="stat-pill">
        <div class="stat-pill-val" id="sfStreak">0</div>
        <div class="stat-pill-lbl">STREAK</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill-val" id="sfDone">0/0</div>
        <div class="stat-pill-lbl">TODAY</div>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="5.1" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="10" cy="10" r="1.9" stroke="currentColor" stroke-width="1.4"/>
          <path d="M10 2.6v2.3M10 15.1v2.3M17.4 10h-2.3M4.9 10H2.6M15.23 4.77l-1.63 1.63M6.4 13.6l-1.63 1.63M15.23 15.23l-1.63-1.63M6.4 6.4L4.77 4.77" stroke="currentColor" stroke-width="2" stroke-linecap="butt"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main"></main>

</div>

<!-- Bottom navigation (phones / narrow screens) -->
<nav class="bottomnav" id="bottomnav">
  <a class="nav-item" data-page="today" href="#">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/><path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span>Today</span>
  </a>
  <a class="nav-item" data-page="calendar" href="#">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14M7 3v2M13 3v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span>Calendar</span>
  </a>
  <a class="nav-item" data-page="topics" href="#">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><path d="M4 5h12M4 10h8M4 15h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span>Topics</span>
  </a>
  <a class="nav-item" data-page="exams" href="#">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><path d="M5 3h10a1 1 0 0 1 1 1v13l-3-2-3 2-3-2-2 2V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M8 8h5M8 11h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span>Exams</span>
  </a>
  <button class="bn-more" id="bnMore" type="button">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><circle cx="4.5" cy="10" r="1.7" fill="currentColor"/><circle cx="10" cy="10" r="1.7" fill="currentColor"/><circle cx="15.5" cy="10" r="1.7" fill="currentColor"/></svg>
    <span>More</span>
  </button>
</nav>

<!-- "More" sheet -->
<div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
<div class="more-sheet" id="moreSheet" hidden>
  <div class="sheet-grab"></div>
  <a class="nav-item sheet-item" data-page="recall" href="#">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 9h6M7 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Active Recall
  </a>
  <a class="nav-item sheet-item" data-page="fitness" href="#">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><path d="M3 10h2M15 10h2M5 10a5 5 0 0 1 10 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="10" cy="10" r="2" fill="currentColor"/><path d="M3 8v4M17 8v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    Fitness Hub
  </a>
  <a class="nav-item sheet-item" data-page="otherdates" href="#">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.5"/><path d="M7 12h.01M10 12h.01M13 12h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Availability
  </a>
  <button class="sheet-item" id="sheetSettings" type="button">
    <svg class="bn-ic" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="5.1" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="10" cy="10" r="1.9" stroke="currentColor" stroke-width="1.4"/>
      <path d="M10 2.6v2.3M10 15.1v2.3M17.4 10h-2.3M4.9 10H2.6M15.23 4.77l-1.63 1.63M6.4 13.6l-1.63 1.63M15.23 15.23l-1.63-1.63M6.4 6.4L4.77 4.77" stroke="currentColor" stroke-width="2" stroke-linecap="butt"/>
    </svg>
    Settings
  </button>
  <div class="sheet-stats">
    <span>🔥 <b id="msStreak">0</b> streak</span>
    <span>✅ <b id="msDone">0/0</b> today</span>
  </div>
</div>

<!-- Overlay + Modal -->
<div class="overlay" id="overlay"></div>
<div class="modal-wrap" id="modalWrap" hidden>
  <div class="modal" id="modal"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Undo toast (separate element so it can carry a button) -->
<div class="undo-toast" id="undoToast"></div>

<script src="pyodide/pyodide.js"></script>
<script src="bridge.js"></script>
<script src="app.js"></script>
<script src="mobile.js"></script>
</body>
</html>
